syntax = "proto3";

package stats;

option go_package = "./pb";

service Stats {
  rpc GetStats(StatsRequest) returns (StatsResponse);
}

message StatsRequest {
  string short_code = 1;
}

message StatsResponse {
  string short_code = 1;
  string long_url   = 2;
  int64  pv         = 3;
  int64  uv         = 4;
}
