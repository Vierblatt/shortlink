version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: golink-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: golink
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: golink-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: golink-etcd
    restart: always
    environment:
      ETCD_NAME: golink-etcd
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_CLUSTER: default=http://0.0.0.0:2380
      ETCD_INITIAL_CLUSTER_TOKEN: golink-cluster
      ETCD_INITIAL_CLUSTER_STATE: new
      ALLOW_NONE_AUTHENTICATION: "yes"
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/etcd-data

  kafka:
    image: bitnami/kafka:3.6
    container_name: golink-kafka
    restart: always
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka

  link-rpc:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.link
    container_name: golink-link-rpc
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      etcd:
        condition: service_started
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root123}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "9000:9000"

  stats-rpc:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.stats
    container_name: golink-stats-rpc
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      etcd:
        condition: service_started
    ports:
      - "9001:9001"

  logconsumer:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.logconsumer
    container_name: golink-logconsumer
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root123}

  gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.gateway
    container_name: golink-gateway
    restart: always
    depends_on:
      - link-rpc
      - etcd
    ports:
      - "8888:8888"

volumes:
  mysql_data:
  redis_data:
  etcd_data:
  kafka_data:
